<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>User Directory</title>

<style>
    *{
        margin:0;
        padding:0;
        box-sizing:border-box;
    }

    body{
        font-family: Arial, sans-serif;
        min-height:100vh;
        background: linear-gradient(135deg,#667eea,#764ba2);
        padding:40px;
        text-align:center;
    }

    h1{
        color:white;
        margin-bottom:20px;
        text-shadow:2px 2px 5px rgba(0,0,0,0.3);
    }

    button{
        background:white;
        color:#764ba2;
        border:none;
        padding:12px 25px;
        border-radius:30px;
        font-size:16px;
        font-weight:bold;
        cursor:pointer;
        transition:0.3s;
    }

    button:hover{
        transform:scale(1.1);
        box-shadow:0 5px 15px rgba(0,0,0,0.3);
    }

    #status{
        margin:20px;
        color:white;
        font-size:20px;
        font-weight:bold;
    }

    .spinner{
        width:50px;
        height:50px;
        border:5px solid rgba(255,255,255,0.3);
        border-top:5px solid white;
        border-radius:50%;
        margin:20px auto;
        animation:spin 1s linear infinite;
    }

    @keyframes spin{
        100%{
            transform:rotate(360deg);
        }
    }

    #users{
        display:flex;
        flex-wrap:wrap;
        justify-content:center;
        gap:20px;
        margin-top:20px;
    }

    .card{
        width:280px;
        background:white;
        padding:20px;
        border-radius:15px;
        box-shadow:0 5px 15px rgba(0,0,0,0.2);
        transition:0.4s;
        animation:fadeIn 1s;
    }

    .card:hover{
        transform:translateY(-10px);
    }

    .card h3{
        color:#764ba2;
        margin-bottom:10px;
    }

    .card p{
        margin:8px 0;
        color:#555;
    }

    @keyframes fadeIn{
        from{
            opacity:0;
            transform:translateY(20px);
        }
        to{
            opacity:1;
            transform:translateY(0);
        }
    }
</style>
</head>

<body>

<h1>🌟 User Directory Dashboard</h1>

<button onclick="loadUsers()">Load Users</button>

<div id="status"></div>
<div id="loader"></div>
<div id="users"></div>

<script>

function loadUsers(){

    document.getElementById("status").innerHTML = "Loading...";
    document.getElementById("loader").innerHTML =
    '<div class="spinner"></div>';
    document.getElementById("users").innerHTML = "";

    setTimeout(() => {

        fetch("https://jsonplaceholder.typicode.com/users")
        .then(response => response.json())
        .then(data => {

            let output="";

            data.forEach(user => {

                output += `
                <div class="card">
                    <h3>👤 ${user.name}</h3>
                    <p>📧 ${user.email}</p>
                    <p>📞 ${user.phone}</p>
                </div>
                `;
            });

            document.getElementById("users").innerHTML = output;
            document.getElementById("status").innerHTML =
            "✅ Loaded Successfully";
            document.getElementById("loader").innerHTML = "";
        })

        .catch(error => {
            document.getElementById("status").innerHTML =
            "❌ Error Loading Data";
            console.log(error);
        });

    },2000);
}

</script>

</body>
</html>
